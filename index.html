<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribuidora Nancan | Catálogo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --primary: #00b894;
            --text-dark: #2d3436;
            --text-light: #636e72;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
        }

        /* Contenedor Principal */
        .catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Card Moderna */
        .product-card {
            background: white;
            border-radius: 15px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid #edf2f7;
            transition: transform 0.2s;
        }

        .product-card:active { transform: scale(0.98); }

        .product-code {
            font-size: 0.65rem;
            color: #a0aec0;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .img-container {
            width: 100%;
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .product-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
            height: 2.5em;
            overflow: hidden;
            margin: 5px 0;
        }

        .product-price {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            margin-top: auto;
        }

        .iva-tag {
            font-size: 0.65rem;
            color: var(--text-light);
            display: block;
            font-weight: normal;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Responsive para celulares */
        @media (max-width: 480px) {
            .catalog-container { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="catalog-container" id="lista-productos">
        </div>

    <script>
        // Función para cargar tus 227 productos
        async function cargarProductos() {
            try {
                const response = await fetch('productos.json');
                const productos = await response.json();
                const contenedor = document.getElementById('lista-productos');
                
                contenedor.innerHTML = productos.map(p => `
                    <div class="product-card">
                        <span class="product-code">COD: ${p.codigo || 'S/C'}</span>
                        <div class="img-container">
                            <img src="${p.imagen}" alt="${p.nombre}" onerror="this.src='https://via.placeholder.com/150?text=Sin+Imagen'">
                        </div>
                        <div class="product-name">${p.nombre}</div>
                        <div class="product-price">
                            $${p.precio}
                            <span class="iva-tag">precio sin IVA</span>
                        </div>
                        <button class="btn-add" onclick="agregarAlCarrito('${p.codigo}')">Agregar</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error("Error cargando productos:", error);
            }
        }

        function agregarAlCarrito(codigo) {
            console.log("Producto agregado:", codigo);
            // Aquí va tu lógica de carrito que ya tenías
        }

        window.onload = cargarProductos;
    </script>
</body>
</html>
