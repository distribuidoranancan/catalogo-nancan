<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Digital | Mayorista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --primary-color: #00b894; /* Color para botones y acentos */
            --text-main: #2d3436;
            --text-light: #636e72;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        /* Contenedor de la cuadrícula de productos */
        .catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Estilo de la Card */
        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            border: 1px solid #eee;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease;
        }

        .product-card:active {
            transform: scale(0.97);
        }

        .product-code {
            font-size: 0.65rem;
            color: var(--text-light);
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .product-image-container {
            width: 100%;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fcfcfc;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .product-image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .product-name {
            font-size: 0.9rem;
            font-weight: 600;
            margin: 5px 0;
            height: 2.4em; /* Mantiene alineación si el nombre es largo */
            overflow: hidden;
        }

        .product-price {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-top: 5px;
        }

        .price-label {
            font-size: 0.65rem;
            color: var(--text-light);
            display: block;
            font-weight: 400;
        }

        .btn-add {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            width: 100%;
        }

        /* Responsivo para pantallas muy pequeñas */
        @media (max-width: 400px) {
            .catalog-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                padding: 5px;
            }
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="catalog-container" id="catalog">
        </div>

    <script>
        // Aquí mantendrías tu lógica de carga de JSON, 
        // el buscador y el carrito que ya funcionan perfecto.
    </script>
</body>
</html>
