<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nancan — Pedidos Mayoristas</title>
  <link rel="icon" type="image/png" href="nancan_whatsapp.png">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #FF6B35;
      --secondary: #FFD93D;
      --dark: #1A1A2E;
      --bg: #F8F9FA;
      --white: #ffffff;
      --whatsapp: #25D366;
      --text-muted: #6c757d;
      --border: #e9ecef;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Nunito', sans-serif; 
      background: var(--bg); 
      color: var(--dark); 
      padding-bottom: 140px; 
    }

    /* Header */
    header {
      background: var(--dark);
      color: white;
      padding: 1rem;
      border-bottom: 4px solid var(--secondary);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .header-content {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .product-count {
      background: var(--primary);
      padding: 6px 12px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 0.8rem;
    }

    /* Controles */
    .controls {
      max-width: 1000px;
      margin: 20px auto;
      padding: 0 15px;
      display: grid;
      grid-template-columns: 2fr 1fr auto;
      gap: 10px;
    }
    input, select {
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
    }
    input:focus { border-color: var(--primary); }
    .btn-clear {
      background: #eee;
      border: none;
      padding: 0 15px;
      border-radius: 12px;
      cursor: pointer;
    }

    /* Lista de Productos */
    .table-container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    table { width: 100%; border-collapse: collapse; }
    th { background: #fafafa; padding: 15px; text-align: left; font-size: 0.8rem; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    td { padding: 12px 15px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    
    /* Estilo de la Fila de Producto con Foto */
    .prod-row { display: flex; align-items: center; gap: 12px; }
    .prod-img { 
      width: 55px; 
      height: 55px; 
      object-fit: contain; 
      background: #f9f9f9; 
      border-radius: 8px; 
      border: 1px solid #eee;
      cursor: zoom-in; /* Indica que se puede agrandar */
      transition: transform 0.2s;
    }
    .prod-img:hover { transform: scale(1.05); }

    .prod-info { display: flex; flex-direction: column; }
    .p-name { font-weight: 700; font-size: 0.9rem; line-height: 1.2; }
    .p-meta { font-size: 0.7rem; color: var(--text-muted); }
    .tag-prov { 
        font-size: 0.6rem; 
        background: #eef2ff; 
        color: #4338ca; 
        padding: 2px 6px; 
        border-radius: 4px; 
        width: fit-content; 
        margin-top: 4px;
        font-weight: bold;
    }

    .price { font-weight: 900; color: var(--primary); font-size: 1.1rem; }

    /* Cantidades */
    .qty-control {
      display: flex;
      align-items: center;
      background: #f1f3f5;
      padding: 3px;
      border-radius: 10px;
      width: fit-content;
    }
    .qty-btn {
      border: none;
      background: white;
      width: 28px;
      height: 28px;
      border-radius: 7px;
      cursor: pointer;
      font-weight: 900;
    }
    .qty-num { width: 30px; text-align: center; font-weight: 800; }

    /* Modal de Imagen Agrandada */
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .modal-content {
      max-width: 90%;
      max-height: 80%;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    /* Footer */
    footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; padding: 20px; border-top: 2px solid var(--border);
      z-index: 1000;
    }
    .footer-flex { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .total-val { font-size: 1.5rem; font-weight: 900; color: var(--primary); }
    .btn-order {
      background: var(--whatsapp); color: white; border: none; padding: 12px 25px;
      border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 1rem;
    }

    @media (max-width: 600px) {
      .controls { grid-template-columns: 1fr; }
      .p-name { font-size: 0.8rem; }
      .prod-img { width: 45px; height: 45px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-content">
    <h1>NANCAN</h1>
    <div class="product-count" id="countBadge">0 Unidades</div>
  </div>
</header>

<div class="controls">
  <input type="text" id="q" placeholder="Buscar producto o código..." oninput="updateList()">
  <select id="f" onchange="updateList()">
    <option value="">Todos los Proveedores</option>
  </select>
  <button class="btn-clear" onclick="clearCart()">🗑️</button>
</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>Producto</th>
        <th>Precio</th>
        <th>Pedido</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

<div id="imgModal" class="modal" onclick="closeModal()">
  <img class="modal-content" id="modalImg">
</div>

<footer>
  <div class="footer-flex">
    <div>
      <div style="font-size: 0.7rem; color: gray; font-weight: 800;">TOTAL MAYORISTA</div>
      <div class="total-val" id="total">$ 0</div>
    </div>
    <button class="btn-order" onclick="sendOrder()">Enviar Pedido</button>
  </div>
</footer>

<script>
// Base de datos (asegúrate de incluir todos tus productos aquí)
const db = [
  {"c":"IKCAP001","d":"CAPIBARA C/MOCHILA","p":"ISAKITO","pv":34100,"pm":15000},
  {"c":"7108","d":"CARS MACK GRANDE A FRICCION","p":"ARBREX","pv":96850,"pm":41970},
  {"c":"2985","d":"MOTOR SPEED MOTO DIE CAST","p":"DITOYS","pv":5800,"pm":2900},
  {"c":"C4982","d":"HW AUTO BASICO","p":"SUR LATINA","pv":6500,"pm":3490},
  {"c":"D013","d":"VALIJA JULIANA DOCTORA GRANDE","p":"SISFRIENDS","pv":44990,"pm":22900},
  {"c":"99547","d":"CRY BABIES 13 CM","p":"WABRO","pv":15000,"pm":5500},
  {"c":"F123","d":"NERF ELITE 2.0","p":"WABRO","pv":28000,"pm":12500},
  {"c":"70990","d":"PLAYMOBIL NINJA","p":"INTEK","pv":29990,"pm":13500}
];

const dbIndex = Object.fromEntries(db.map(x => [x.c, x]));
let cart = JSON.parse(localStorage.getItem("cart")) || {};

function init() {
  const provs = [...new Set(db.map(x => x.p))].sort();
  const select = document.getElementById('f');
  provs.forEach(p => {
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    select.appendChild(o);
  });
  updateList();
  calc();
}

function updateList() {
  const q = document.getElementById('q').value.toLowerCase();
  const f = document.getElementById('f').value;
  const list = document.getElementById('list');
  list.innerHTML = '';

  const filtered = db.filter(x => {
    const matchQ = x.d.toLowerCase().includes(q) || x.c.toLowerCase().includes(q);
    const matchF = !f || x.p === f;
    return matchQ && matchF;
  });

  filtered.forEach(x => {
    const n = cart[x.c] || 0;
    const tr = document.createElement('tr');
    const fotoUrl = `fotos/${x.c}.jpg`;

    tr.innerHTML = `
      <td>
        <div class="prod-row">
          <img src="${fotoUrl}" class="prod-img" 
               onclick="openModal('${fotoUrl}')" 
               onerror="this.src='https://placehold.co/100x100?text=Toy'; this.onclick=null;">
          <div class="prod-info">
            <span class="p-name">${x.d}</span>
            <span class="p-meta">Cód: ${x.c}</span>
            <span class="tag-prov">${x.p}</span>
          </div>
        </div>
      </td>
      <td><div class="price">$${x.pm.toLocaleString()}</div></td>
      <td>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty('${x.c}', -1)">-</button>
          <span class="qty-num" id="n-${x.c}">${n}</span>
          <button class="qty-btn" onclick="changeQty('${x.c}', 1)">+</button>
        </div>
      </td>
    `;
    list.appendChild(tr);
  });
}

// Funciones para el Modal
function openModal(src) {
  const modal = document.getElementById("imgModal");
  const modalImg = document.getElementById("modalImg");
  modal.style.display = "flex";
  modalImg.src = src;
}

function closeModal() {
  document.getElementById("imgModal").style.display = "none";
}

function changeQty(c, d) {
  cart[c] = (cart[c] || 0) + d;
  if (cart[c] <= 0) delete cart[c];
  
  const el = document.getElementById(`n-${c}`);
  if (el) el.textContent = cart[c] || 0;

  localStorage.setItem("cart", JSON.stringify(cart));
  calc();
}

function calc() {
  let t = 0, items = 0;
  for (let c in cart) {
    const x = dbIndex[c];
    if (x) {
      t += x.pm * cart[c];
      items += cart[c];
    }
  }
  document.getElementById('total').textContent = `$ ${t.toLocaleString()}`;
  document.getElementById('countBadge').textContent = `${items} Unidades`;
}

function clearCart() {
  if (confirm("¿Vaciar el pedido actual?")) {
    cart = {};
    localStorage.removeItem("cart");
    updateList();
    calc();
  }
}

function sendOrder() {
  const keys = Object.keys(cart);
  if (keys.length === 0) return alert("El carrito está vacío.");

  let m = "🧾 *PEDIDO MAYORISTA - NANCAN*\n\n";
  let totalCash = 0;

  keys.forEach(c => {
    const x = dbIndex[c];
    const sub = x.pm * cart[c];
    m += `• ${x.d}\n   Cant: ${cart[c]} | Sub: $${sub.toLocaleString()}\n`;
    totalCash += sub;
  });

  m += `\n━━━━━━━━━━━━━━\n*TOTAL: $${totalCash.toLocaleString()}*`;
  window.open(`https://wa.me/5492235527149?text=${encodeURIComponent(m)}`);
}

init();
</script>
</body>
</html>
